name: Package

on:
  push:
    # tags:
    #   - 'v*'
  workflow_dispatch:

jobs:
  build_deb:
    strategy:
      fail-fast: false
      matrix:
        os:
          [
            "ubuntu:25.10",
            "ubuntu:25.04",
            "ubuntu:24.04",
            "ubuntu:22.04",
            "debian:12",
            "debian:13",
            "linuxmintd/mint22-amd64",
            "linuxmintd/mint21-amd64",
          ]
    runs-on: ubuntu-latest
    container: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt install -y pkg-config clang cmake extra-cmake-modules gettext libfmt-dev
          apt install -y fcitx5 libfcitx5core-dev libfcitx5config-dev libfcitx5utils-dev fcitx5-modules-dev
          apt install -y libicu-dev libjson-c-dev build-essential
          apt install -y file  # Required for CPack shlibdeps
          
      - name: Build and Package
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cd build
          cpack -G DEB
          
      - name: Rename Package
        run: |
          cd build
          # Add OS and Architecture to the filename
          OS_NAME=$(grep "^ID=" /etc/os-release | cut -d'=' -f2 | sed 's/"//g')
          OS_VERSION=$(grep "^VERSION_ID=" /etc/os-release | cut -d'=' -f2 | sed 's/"//g')
          PKG_NAME=$(ls *.deb)
          NEW_PKG_NAME="${PKG_NAME%.deb}-${OS_NAME}-${OS_VERSION}-$(uname -m).deb"
          mv "$PKG_NAME" "$NEW_PKG_NAME"
          echo "PACKAGE_PATH=build/$NEW_PKG_NAME" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcitx5-mcbopomofo-deb-${{ strategy.job-index }}
          path: build/*.deb

  build_rpm:
    strategy:
      fail-fast: false
      matrix:
        os: ["fedora:42", "fedora:41", "fedora:40", "fedora:39"]
    runs-on: ubuntu-latest
    container: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Install dependencies
        run: |
          dnf -y install gcc g++ rpm-build \
                 fcitx5 fcitx5-configtool fcitx5-devel \
                 cmake extra-cmake-modules gettext fmt-devel \
                 libicu-devel json-c-devel
          
      - name: Build and Package
        run: |
          cmake -B build -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cd build
          cpack -G RPM
          
      - name: Rename Package
        run: |
          cd build
          OS_NAME=$(grep "^ID=" /etc/os-release | cut -d'=' -f2 | sed 's/"//g')
          OS_VERSION=$(grep "^VERSION_ID=" /etc/os-release | cut -d'=' -f2 | sed 's/"//g')
          PKG_NAME=$(ls *.rpm)
          NEW_PKG_NAME="${PKG_NAME%.rpm}-${OS_NAME}-${OS_VERSION}-$(uname -m).rpm"
          mv "$PKG_NAME" "$NEW_PKG_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcitx5-mcbopomofo-rpm-${{ strategy.job-index }}
          path: build/*.rpm
